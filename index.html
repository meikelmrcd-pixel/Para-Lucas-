<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        body { background: #0b0914; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #ffd700; margin-bottom: 20px; text-align: center; }
        
        /* Girasol hecho con código */
        .sunflower { position: relative; width: 150px; height: 150px; margin: 30px 0; }
        .petals { position: absolute; width: 100%; height: 100%; animation: rotate 10s linear infinite; }
        .petal { position: absolute; width: 50px; height: 20px; background: #ffd700; border-radius: 50%; left: 50px; top: 65px; transform-origin: 25px 10px; }
        .center { position: absolute; width: 60px; height: 60px; background: #5d4037; border-radius: 50%; top: 45px; left: 45px; z-index: 2; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .message-card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; max-width: 350px; text-align: center; }
        .timer { display: flex; gap: 10px; margin-top: 20px; }
        .time-segment { background: #222; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Para mi amado Lucas 🌻</h1>
    
    <div class="sunflower">
        <div class="petals">
            <div class="petal" style="transform: rotate(0deg)"></div>
            <div class="petal" style="transform: rotate(45deg)"></div>
            <div class="petal" style="transform: rotate(90deg)"></div>
            <div class="petal" style="transform: rotate(135deg)"></div>
            <div class="petal" style="transform: rotate(180deg)"></div>
            <div class="petal" style="transform: rotate(225deg)"></div>
            <div class="petal" style="transform: rotate(270deg)"></div>
            <div class="petal" style="transform: rotate(315deg)"></div>
        </div>
        <div class="center"></div>
    </div>

    <div class="message-card">
        <p>Este mes no ha sido el mejor, pero gracias por todo. Lo amo mucho y quiero que mejoremos juntos. Feliz primer mes. 💛🌻</p>
    </div>

    <div class="timer">
        <div class="time-segment"><span id="days">00</span><br>Días</div>
        <div class="time-segment"><span id="hours">00</span><br>Hrs</div>
        <div class="time-segment"><span id="minutes">00</span><br>Min</div>
        <div class="time-segment"><span id="seconds">00</span><br>Seg</div>
    </div>

    <script>
        const startDate = new Date('2026-04-25T00:00:00');
        function update() {
            const diff = new Date() - startDate;
            document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById('hours').innerText = Math.floor((diff / (1000*60*60)) % 24);
            document.getElementById('minutes').innerText = Math.floor((diff / (1000*60)) % 60);
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
