<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        h1 { color: #ffd700; margin-top: 20px; text-align: center; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        
        /* Ramo grande y con brillo propio */
        .flower-container { font-size: 150px; margin: 30px 0; filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.6)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .message-card { border: 1px solid #ffd700; padding: 25px; max-width: 350px; text-align: center; border-radius: 20px; background: rgba(20, 20, 20, 0.9); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        
        /* Contador grande y visible */
        .counter-box { margin-top: 30px; width: 100%; max-width: 350px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .time-segment { background: #1a1a1a; padding: 10px 5px; border-radius: 10px; border-bottom: 3px solid #ffd700; text-align: center; }
        .time-number { font-size: 1.2rem; font-weight: bold; color: #fff; display: block; }
        .time-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }

        /* Estrellas de fondo */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .sparkle { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.5); } }
    </style>
</head>
<body>
    <div class="stars" id="starContainer"></div>
    <h1>Para mi amado Lucas 🌻</h1>
    
    <div class="flower-container">💐</div>
    
    <div class="message-card">
        <p>Este mes no ha sido el mejor que hemos tenido juntos, pero de verdad le agradezco el esfuerzo y el tiempo que le has puesto... <br><br><b>Lo amo mucho</b> y quiero que mejoremos juntos. Feliz primer mes. 💛✨</p>
    </div>

    <div class="counter-box">
        <div class="time-segment"><span class="time-number" id="months">00</span><span class="time-label">Meses</span></div>
        <div class="time-segment"><span class="time-number" id="days">00</span><span class="time-label">Días</span></div>
        <div class="time-segment"><span class="time-number" id="hours">00</span><span class="time-label">Hrs</span></div>
        <div class="time-segment"><span class="time-number" id="minutes">00</span><span class="time-label">Min</span></div>
        <div class="time-segment"><span class="time-number" id="seconds">00</span><span class="time-label">Seg</span></div>
    </div>

    <script>
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.width = Math.random() * 4 + 'px';
            s.style.height = s.style.width;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 3 + 's';
            container.appendChild(s);
        }

        function updateCounter() {
            const now = new Date();
            const start = new Date('2026-04-25T00:00:00');
            let diff = now - start;
            document.getElementById('months').innerText = Math.floor(diff / (1000*60*60*24*30)).toString().padStart(2, '0');
            document.getElementById('days').innerText = Math.floor((diff / (1000*60*60*24)) % 30).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((diff / (1000*60*60)) % 24).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((diff / (1000*60)) % 60).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
