<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        /* (Tus estilos anteriores se mantienen, solo añadimos el botón) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 50% 0%, #241d33 0%, #050505 100%); color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .flower-container { font-size: 140px; margin: 20px 0; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        /* Botón de música */
        #playBtn { 
            background: #ffd700; border: none; padding: 15px 25px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>
    <h1>Para mi amado Lucas 🌻</h1>
    
    <button id="playBtn" onclick="playMusic()">¡Toca aquí para escuchar nuestra canción! 🎵</button>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>
    
    <div class="flower-container">💐</div>
    
    <script>
        function playMusic() {
            const audio = document.getElementById("bgMusic");
            audio.play();
            document.getElementById("playBtn").style.display = "none"; // Oculta el botón al tocarlo
        }
    </script>
</body>
</html>
