<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(180deg, #0b0914 0%, #161224 100%); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        h1 { font-size: 1.8rem; color: #ffd700; text-align: center; margin: 20px 0; text-shadow: 0 0 10px rgba(255, 215, 0, 0.6); }
        
        /* Contenedor del Emoji que reemplaza a la imagen */
        .flower-emoji { font-size: 120px; margin: 30px 0; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5)); animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .message-card { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; width: 100%; max-width: 350px; text-align: center; margin-bottom: 20px; }
        .highlight { color: #ffd700; font-weight: bold; }
        .counter-box { background: rgba(255, 215, 0, 0.08); border-radius: 15px; padding: 15px; width: 100%; max-width: 350px; text-align: center; }
        .timer { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .time-segment { background: rgba(15, 12, 26, 0.7); padding: 8px 4px; border-radius: 8px; border-bottom: 2px solid #ffd700; }
        .time-number { font-size: 1.1rem; font-weight: bold; display: block; }
        .time-label { font-size: 0.6rem; color: #bfaeff; text-transform: uppercase; display: block; }
    </style>
</head>
<body>
    <h1>Para mi amado Lucas 🌻</h1>
    
    <div class="flower-emoji">💐</div>

    <div class="message-card">
        <p>Este mes no ha sido el mejor, pero gracias por todo. <span class="highlight">Lo amo mucho</span> y quiero que mejoremos juntos. Feliz primer mes. 💛🌻✨</p>
    </div>

    <div class="counter-box">
        <h2>Tiempo Juntos</h2>
        <div class="timer">
            <div class="time-segment"><span class="time-number" id="months">00</span><span class="time-label">Meses</span></div>
            <div class="time-segment"><span class="time-number" id="days">00</span><span class="time-label">Días</span></div>
            <div class="time-segment"><span class="time-number" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-segment"><span class="time-number" id="minutes">00</span><span class="time-label">Min</span></div>
            <div class="time-segment"><span class="time-number" id="seconds">00</span><span class="time-label">Seg</span></div>
        </div>
    </div>
    <script>
        const startDate = new Date('2026-04-25T00:00:00');
        function updateCounter() {
            const now = new Date();
            let months = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            let tempDate = new Date(startDate);
            tempDate.setMonth(tempDate.getMonth() + months);
            if (tempDate > now) { months--; tempDate = new Date(startDate); tempDate.setMonth(tempDate.getMonth() + months); }
            const diff = now - tempDate;
            document.getElementById('months').innerText = String(months).padStart(2, '0');
            document.getElementById('days').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
        }
        setInterval(updateCounter, 1000);
        updateCounter();
    </script>
</body>
</html>
