<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        
        /* El botón más grande y llamativo */
        #playBtn { 
            background: #ffd700; color: #000; border: none; padding: 20px 40px; 
            border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; 
            margin-top: 50px; box-shadow: 0 0 30px #ffd700; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .flower-container { font-size: 140px; margin: 30px 0; }
        .hidden { display: none; }
        #mainContent { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <button id="playBtn" onclick="startExperience()">¡Presiona aquí para ver tu sorpresa! 🌻</button>

    <div id="mainContent" class="hidden">
        <h1>Para mi amado Lucas 🌻</h1>
        <div class="flower-container">💐</div>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; max-width: 350px;">
            <p>Este mes no ha sido el mejor, pero agradezco el esfuerzo. <b>Te amo mucho</b> y quiero que mejoremos juntos. Feliz primer mes. 💛</p>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/k3l5m9.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startExperience() {
            const audio = document.getElementById("bgMusic");
            const btn = document.getElementById("playBtn");
            const content = document.getElementById("mainContent");
            
            audio.play().then(() => {
                btn.style.display = "none";
                content.classList.remove("hidden");
            }).catch(e => {
                alert("Toca la pantalla una vez más si no suena!");
            });
        }
    </script>
</body>
</html>
