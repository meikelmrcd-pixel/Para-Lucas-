<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi amado Lucas 🌻</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        
        /* Muchos destellos de fondo */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .sparkle { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.5); } }

        h1 { color: #ffd700; margin: 20px 0; z-index: 1; }
        
        /* Marco dorado elegante */
        .message-card { 
            border: 2px solid #ffd700; 
            padding: 30px; 
            max-width: 350px; 
            text-align: center; 
            border-radius: 20px; 
            background: rgba(20, 20, 20, 0.8);
            z-index: 1;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .flower-emoji { font-size: 100px; z-index: 1; animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="stars" id="starContainer"></div>
    <h1>Para mi amado Lucas 🌻</h1>
    <div class="flower-emoji">💐</div>
    <div class="message-card">
        <p>Este mes no ha sido el mejor que hemos tenido juntos, pero de verdad le agradezco el esfuerzo y el tiempo que le has puesto... <br><br><b>Lo amo mucho</b> y quiero que mejoremos juntos. Feliz primer mes. 💛✨</p>
    </div>

    <script>
        // Generar 30 destellos automáticamente
        const container = document.getElementById('starContainer');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.width = Math.random() * 5 + 'px';
            s.style.height = s.style.width;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 3 + 's';
            container.appendChild(s);
        }
    </script>
</body>
</html>
